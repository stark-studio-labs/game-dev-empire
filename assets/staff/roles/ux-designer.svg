  <rect x="52" y="68" width="24" height="18" rx="3" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.4"/>
  <rect x="80" y="68" width="24" height="18" rx="3" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.4"/>
