  <!-- Horizontal equator -->
  <line x1="26" y1="60" x2="94" y2="60" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
  <!-- Speech bubble -->
  <rect x="76" y="20" width="38" height="26" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2.5"/>
  <path d="M80 46 L76 54 L86 46 Z" fill="#58a6ff" opacity="0.8"/>
