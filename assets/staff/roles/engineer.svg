  <line x1="64" y1="38" x2="64" y2="26" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="38" x2="78" y2="26" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="90" x2="50" y2="102" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="90" x2="64" y2="102" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="90" x2="78" y2="102" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="50" x2="26" y2="50" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="64" x2="26" y2="64" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="78" x2="26" y2="78" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="50" x2="102" y2="50" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="64" x2="102" y2="64" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="78" x2="102" y2="78" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <!-- Code brackets inside chip -->
  <text x="64" y="70" fill="#58a6ff" font-family="monospace" font-size="14" font-weight="700" text-anchor="middle" opacity="0.9">&lt;/&gt;</text>
