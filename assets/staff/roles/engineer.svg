<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#161b22"/>
  <!-- Chip body -->
  <rect x="38" y="38" width="52" height="52" rx="6" fill="none" stroke="#58a6ff" stroke-width="3.5"/>
  <rect x="48" y="48" width="32" height="32" rx="4" fill="#58a6ff" opacity="0.12"/>
  <!-- Pins -->
